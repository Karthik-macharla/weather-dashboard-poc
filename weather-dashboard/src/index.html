<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>WeatherDashboard</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Content Security Policy: mitigates XSS even if Angular compiler SVG/MathML vulnerabilities
       (CVE affects @angular/compiler <=18.2.14, no patch available) were triggered.
       Blocks inline scripts, restricts object/frame sources, forces HTTPS in production. -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' http://localhost:5000; object-src 'none'; frame-ancestors 'none';">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
  <app-root></app-root>
</body>
</html>
